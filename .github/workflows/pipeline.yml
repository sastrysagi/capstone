# Write .github/workflows/pipeline.yml (Python-script based, no notebooks)
import os

workflow_path = os.path.join(".github", "workflows", "pipeline.yml")

workflow_content = r"""
name: capstone3-ml-pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      HF_MODEL_REPO: ${{ secrets.HF_MODEL_REPO }}
      HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r deployment/requirements.txt
          pip install pandas numpy scikit-learn joblib matplotlib seaborn
          pip install huggingface_hub datasets

      - name: Run Training Script
        run: |
          python scripts/train.py

      - name: Upload Artifacts to Hugging Face
        run: |
          python scripts/push_to_hf.py

      - name: Upload Logs (Proof)
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: |
            data/
            models/
"""

os.makedirs(os.path.dirname(workflow_path), exist_ok=True)

with open(workflow_path, "w", encoding="utf-8") as f:
    f.write(workflow_content.strip() + "\n")

print("✅ Wrote:", workflow_path)
